# LLM Data Poisoning Detection PaaS — Full Development Stack
# ============================================================
# All service configuration is driven by .env (copy from .env.example).
# Never commit a populated .env file.
#
# Startup order:
#   postgres → redis → neo4j → kafka → api → frontend
#
# Usage:
#   cp infrastructure/.env.example infrastructure/.env
#   docker compose -f infrastructure/docker-compose.yml up

version: "3.9"

# ---------------------------------------------------------------------------
# Named volumes — persisted across container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  kafka_data:
    driver: local

# ---------------------------------------------------------------------------
# Isolated bridge network
# ---------------------------------------------------------------------------
networks:
  paas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL 16 — primary relational store (tenants, results, audit log)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: paas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poisoning_detection}
      POSTGRES_USER: ${POSTGRES_USER:-paas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      # Make pg_isready work without specifying host
      PGHOST: localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - paas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paas_user} -d ${POSTGRES_DB:-poisoning_detection}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # Redis 7 — rate-limit counters, ephemeral scan-status pub/sub, caching
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: paas-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - paas-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 64M
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # Neo4j 5 — provenance lineage graph (dataset → transform → model chains)
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: paas-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-256m}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_dbms_memory_pagecache_size: ${NEO4J_PAGE_CACHE:-256m}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_dbms_connector_bolt_listen__address: "0.0.0.0:7687"
      NEO4J_dbms_connector_http_listen__address: "0.0.0.0:7474"
      # Disable HTTPS in dev; enable with proper cert in production
      NEO4J_dbms_connector_https_enabled: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j-init.cypher:/var/lib/neo4j/import/init.cypher:ro
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
    networks:
      - paas-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # Apache Kafka — KRaft mode (no Zookeeper)
  # Topics: scan-requests, scan-results, audit-events
  # --------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: paas-kafka
    restart: unless-stopped
    environment:
      # KRaft identity
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster identity
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
      # Topic defaults
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Retention
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Performance
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    networks:
      - paas-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # --------------------------------------------------------------------------
  # FastAPI backend — detection engines, REST API, async workers
  # --------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
      target: runtime
      args:
        - PYTHON_VERSION=3.12
    container_name: paas-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override service hostnames to match Docker network aliases
      DB_POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-paas_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-poisoning_detection}
      DB_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      DB_NEO4J_URI: bolt://neo4j:7687
      DB_NEO4J_USER: ${NEO4J_USER:-neo4j}
      DB_NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      KAFKA_BROKER_URL: kafka:9092
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    networks:
      - paas-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=128m,mode=1777

  # --------------------------------------------------------------------------
  # Next.js 14 frontend — AI-SPM dashboard
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
      target: runner
      args:
        - NODE_VERSION=20
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: paas-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    networks:
      - paas-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
